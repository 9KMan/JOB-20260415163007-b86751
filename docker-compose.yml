version: '3.8'

services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: erp_user
      POSTGRES_PASSWORD: erp_password
      POSTGRES_DB: erp_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build: .
    ports:
      - "5000:5000"
    environment:
      FLASK_APP: app
      FLASK_ENV: production
      SECRET_KEY: production-secret-key
      JWT_SECRET_KEY: production-jwt-secret
      DATABASE_URL: postgresql://erp_user:erp_password@db:5432/erp_db
    depends_on:
      - db
    volumes:
      - ./app:/home/deploy/squad/build-worker/JOB-20260415163007-b86751/app
    command: gunicorn -w 4 -b 0.0.0.0:5000 "app:create_app()"

volumes:
  postgres_data: